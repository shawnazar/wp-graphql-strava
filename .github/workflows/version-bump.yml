name: Release Version

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release-pr:
    name: Create release PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Calculate next version
        id: version
        run: |
          CURRENT=$(grep -oP "Version:\s+\K[0-9.]+" graphql-strava-activities.php)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.bump_type }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEXT (${{ inputs.bump_type }})"

      - name: Verify changelog has unreleased entries
        run: |
          UNRELEASED=$(sed -n '/^## \[Unreleased\]/,/^## \[/p' CHANGELOG.md | grep -c '^- ' || true)
          echo "Unreleased entries: $UNRELEASED"
          if [ "$UNRELEASED" -eq 0 ]; then
            echo "::error::CHANGELOG.md has no entries under [Unreleased]. Nothing to release."
            exit 1
          fi

      - name: Clean up stale release branch
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          git push origin --delete "release/${NEXT}" 2>/dev/null || true

      - name: Create release branch
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          git checkout -b "release/${NEXT}"

      - name: Bump version in plugin files
        run: |
          CURRENT="${{ steps.version.outputs.current }}"
          NEXT="${{ steps.version.outputs.next }}"

          sed -i "s/Version:           ${CURRENT}/Version:           ${NEXT}/" graphql-strava-activities.php
          sed -i "s/WPGRAPHQL_STRAVA_VERSION', '${CURRENT}'/WPGRAPHQL_STRAVA_VERSION', '${NEXT}'/" graphql-strava-activities.php
          sed -i "s/Stable tag: ${CURRENT}/Stable tag: ${NEXT}/" readme.txt

      - name: Update changelog
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          DATE=$(date +%Y-%m-%d)
          sed -i "s/^## \[Unreleased\]/## [Unreleased]\n\n## [${NEXT}] - ${DATE}/" CHANGELOG.md

      - name: Commit and push branch
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          git add graphql-strava-activities.php readme.txt CHANGELOG.md
          git commit -m "chore: bump version to ${NEXT}"
          git push origin "release/${NEXT}"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          CURRENT="${{ steps.version.outputs.current }}"

          gh pr create \
            --title "chore: release ${NEXT}" \
            --body "$(cat <<EOF
          ## Release ${NEXT}

          Automated version bump: ${CURRENT} → ${NEXT} (${{ inputs.bump_type }})

          ### Changes
          $(sed -n '/^## \[Unreleased\]/,/^## \['"${NEXT}"'\]/{ /^## \[/d; /^$/d; p; }' CHANGELOG.md)

          ### Checklist
          - [ ] CI passes
          - [ ] Changelog looks correct
          - [ ] Ready to release

          > Merging this PR will automatically create the \`${NEXT}\` tag and trigger the GitHub Release and WordPress.org deploy workflows.
          EOF
          )" \
            --label "release" \
            --head "release/${NEXT}" \
            --base main

      - name: Summary
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          echo "### Release PR created for ${NEXT}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: \`release/${NEXT}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Review and merge the PR to trigger the release" >> "$GITHUB_STEP_SUMMARY"
