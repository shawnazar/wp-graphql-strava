name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            echo "body<<EOF" >> "$GITHUB_OUTPUT"
            echo "## Changes since ${PREV_TAG}" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s" --no-merges >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "body=Initial release." >> "$GITHUB_OUTPUT"
          fi

      - name: Build release zip
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          git archive --format=zip --prefix="graphql-strava-activities/" HEAD -o "graphql-strava-activities-${TAG}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          files: graphql-strava-activities-*.zip
          generate_release_notes: false
