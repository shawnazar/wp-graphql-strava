name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  code-scanning:
    name: Code Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: openssl, mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHPCS (SARIF)
        run: vendor/bin/phpcs --report=json --report-file=phpcs-results.json || true

      - name: Convert PHPCS to SARIF
        run: |
          php -r '
          $json = json_decode(file_get_contents("phpcs-results.json"), true);
          $runs = [[
            "tool" => ["driver" => [
              "name" => "PHP_CodeSniffer",
              "informationUri" => "https://github.com/PHPCSStandards/PHP_CodeSniffer",
              "rules" => []
            ]],
            "results" => []
          ]];
          $ruleIds = [];
          foreach ($json["files"] ?? [] as $file => $data) {
            foreach ($data["messages"] ?? [] as $msg) {
              $ruleId = $msg["source"] ?? "unknown";
              if (!in_array($ruleId, $ruleIds)) {
                $ruleIds[] = $ruleId;
                $runs[0]["tool"]["driver"]["rules"][] = [
                  "id" => $ruleId,
                  "shortDescription" => ["text" => $ruleId]
                ];
              }
              $runs[0]["results"][] = [
                "ruleId" => $ruleId,
                "level" => $msg["type"] === "ERROR" ? "error" : "warning",
                "message" => ["text" => $msg["message"]],
                "locations" => [[
                  "physicalLocation" => [
                    "artifactLocation" => ["uri" => ltrim($file, "/"), "uriBaseId" => "%SRCROOT%"],
                    "region" => ["startLine" => $msg["line"], "startColumn" => $msg["column"]]
                  ]
                ]]
              ];
            }
          }
          $sarif = ["\$schema" => "https://json.schemastore.org/sarif-2.1.0.json", "version" => "2.1.0", "runs" => $runs];
          file_put_contents("phpcs-results.sarif", json_encode($sarif, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES));
          '

      - name: Upload PHPCS SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: phpcs-results.sarif
          category: phpcs

      - name: PHPStan (SARIF)
        run: vendor/bin/phpstan analyse --error-format=json > phpstan-results.json 2>&1 || true

      - name: Convert PHPStan to SARIF
        run: |
          php -r '
          $json = json_decode(file_get_contents("phpstan-results.json"), true);
          $runs = [[
            "tool" => ["driver" => [
              "name" => "PHPStan",
              "informationUri" => "https://phpstan.org",
              "rules" => []
            ]],
            "results" => []
          ]];
          foreach ($json["files"] ?? [] as $file => $data) {
            foreach ($data["messages"] ?? [] as $msg) {
              $runs[0]["results"][] = [
                "ruleId" => "phpstan",
                "level" => "error",
                "message" => ["text" => $msg["message"] ?? $msg],
                "locations" => [[
                  "physicalLocation" => [
                    "artifactLocation" => ["uri" => ltrim($file, "/"), "uriBaseId" => "%SRCROOT%"],
                    "region" => ["startLine" => $msg["line"] ?? 1]
                  ]
                ]]
              ];
            }
          }
          $sarif = ["\$schema" => "https://json.schemastore.org/sarif-2.1.0.json", "version" => "2.1.0", "runs" => $runs];
          file_put_contents("phpstan-results.sarif", json_encode($sarif, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES));
          '

      - name: Upload PHPStan SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: phpstan-results.sarif
          category: phpstan


  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: openssl, mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run linter
        run: composer lint

      - name: Run static analysis
        run: composer analyse

      - name: Run tests
        run: composer test

  security:
    name: Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: openssl, mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Composer audit
        run: composer audit --format=plain

      - name: Composer validate
        run: composer validate --no-check-publish

      - name: Check for debug code in production files
        run: |
          FAIL=0

          # Functions that should never appear in production plugin code.
          for PATTERN in 'var_dump\s*(' 'print_r\s*(' '\bdie\s*(' '\bdd\s*(' 'var_export\s*(' 'debug_backtrace\s*(' 'phpinfo\s*(' 'error_log\s*('; do
            MATCHES=$(grep -rnP "$PATTERN" includes/ graphql-strava-activities.php --include="*.php" || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::Debug function found in production code:"
              echo "$MATCHES"
              FAIL=1
            fi
          done

          exit $FAIL

      - name: Scan for hardcoded secrets
        run: |
          FAIL=0

          # Patterns that suggest hardcoded credentials.
          PATTERNS=(
            'AKIA[0-9A-Z]{16}'                          # AWS access key
            'sk_live_[0-9a-zA-Z]{24,}'                  # Stripe secret key
            'ghp_[0-9a-zA-Z]{36}'                       # GitHub personal token
            'password\s*=\s*["\x27][^"\x27]{8,}["\x27]' # Hardcoded password assignment
            'secret\s*=\s*["\x27][0-9a-f]{32,}["\x27]'  # Hardcoded secret
          )

          for PATTERN in "${PATTERNS[@]}"; do
            MATCHES=$(grep -rnPl "$PATTERN" includes/ graphql-strava-activities.php --include="*.php" 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::Possible hardcoded secret detected in: $MATCHES"
              FAIL=1
            fi
          done

          exit $FAIL

      - name: Check for unsafe PHP functions
        run: |
          FAIL=0

          # Functions flagged by WordPress security guidelines.
          for PATTERN in '\beval\s*(' '\bexec\s*(' '\bsystem\s*(' '\bpassthru\s*(' '\bshell_exec\s*(' '\bproc_open\s*(' '\bpopen\s*(' '\bfile_put_contents\s*(' '\bfile_get_contents\s*(' '\bunserialize\s*('; do
            MATCHES=$(grep -rnP "$PATTERN" includes/ graphql-strava-activities.php --include="*.php" || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::Unsafe PHP function found in production code:"
              echo "$MATCHES"
              FAIL=1
            fi
          done

          exit $FAIL

  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify version consistency
        run: |
          PLUGIN_VERSION=$(grep -oP "Version:\s+\K[0-9.]+" graphql-strava-activities.php)
          CONSTANT_VERSION=$(grep -oP "WPGRAPHQL_STRAVA_VERSION',\s*'\K[0-9.]+" graphql-strava-activities.php)
          STABLE_TAG=$(grep -oP "Stable tag:\s*\K[0-9.]+" readme.txt)

          echo "Plugin header:  $PLUGIN_VERSION"
          echo "PHP constant:   $CONSTANT_VERSION"
          echo "Stable tag:     $STABLE_TAG"

          FAIL=0
          if [ "$PLUGIN_VERSION" != "$CONSTANT_VERSION" ]; then
            echo "::error::Version mismatch: Plugin header ($PLUGIN_VERSION) != WPGRAPHQL_STRAVA_VERSION ($CONSTANT_VERSION)"
            FAIL=1
          fi
          if [ "$PLUGIN_VERSION" != "$STABLE_TAG" ]; then
            echo "::error::Version mismatch: Plugin header ($PLUGIN_VERSION) != readme.txt Stable tag ($STABLE_TAG)"
            FAIL=1
          fi
          exit $FAIL

      - name: Verify distribution archive
        run: |
          FILES=$(git archive --format=tar HEAD | tar -t | sort)
          echo "$FILES"

          # Must include core files.
          for REQUIRED in "graphql-strava-activities.php" "readme.txt" "LICENSE"; do
            if ! echo "$FILES" | grep -qx "$REQUIRED"; then
              echo "::error::Required file missing from archive: $REQUIRED"
              exit 1
            fi
          done

          # Must NOT include dev files.
          for EXCLUDED in ".github/" "tests/" "vendor/" "composer.json" "phpunit.xml.dist" "CLAUDE.md" ".editorconfig"; do
            if echo "$FILES" | grep -q "^$EXCLUDED"; then
              echo "::error::Dev file leaked into archive: $EXCLUDED"
              exit 1
            fi
          done

          echo "Archive contents validated."

      - name: Verify text domain
        run: |
          # Check that all translatable strings use the correct text domain.
          WRONG=$(grep -rn "gettext\|__(\|_e(\|_n(\|_x(\|esc_html__\|esc_html_e\|esc_attr__\|esc_attr_e" \
            includes/ graphql-strava-activities.php \
            --include="*.php" \
            | grep -v "graphql-strava-activities" \
            | grep -v "phpcs:ignore" \
            | grep -v "^Binary" \
            || true)
          if [ -n "$WRONG" ]; then
            echo "::warning::Possible incorrect text domain usage:"
            echo "$WRONG"
          fi

      - name: Verify documentation consistency
        run: |
          FAIL=0

          # Count GraphQL fields in the StravaActivity type definition.
          # Fields are at 4-tab indent ending with "=> [" before the args section.
          CODE_FIELDS=$(sed -n '/register_graphql_object_type/,/register_graphql_field/p' includes/graphql.php | grep -cP "^\t{4}'[a-z]" || echo 0)
          # Count in docs/fields.md (table rows with backtick-wrapped field names).
          DOC_FIELDS=$(grep -cP '^\| `\w+`' docs/fields.md || echo 0)

          echo "GraphQL fields in code: $CODE_FIELDS"
          echo "Fields documented: $DOC_FIELDS"

          if [ "$CODE_FIELDS" != "$DOC_FIELDS" ]; then
            echo "::error::Field count mismatch: graphql.php has $CODE_FIELDS fields but docs/fields.md documents $DOC_FIELDS"
            FAIL=1
          fi

          # Count includes/ PHP files vs architecture.md entries.
          CODE_INCLUDES=$(find includes/ -name "*.php" | wc -l)
          DOC_INCLUDES=$(grep -cP '├──|└──' docs/architecture.md || echo 0)

          echo "PHP files in includes/: $CODE_INCLUDES"
          echo "Files in architecture.md: $DOC_INCLUDES"

          if [ "$CODE_INCLUDES" != "$DOC_INCLUDES" ]; then
            echo "::error::Architecture doc mismatch: includes/ has $CODE_INCLUDES files but docs/architecture.md lists $DOC_INCLUDES"
            FAIL=1
          fi

          # Verify CLAUDE.md field count matches code.
          CLAUDE_FIELDS=$(grep -oP 'exposes \K\d+' CLAUDE.md || echo 0)
          echo "CLAUDE.md states: $CLAUDE_FIELDS fields"

          if [ "$CLAUDE_FIELDS" != "$CODE_FIELDS" ]; then
            echo "::error::CLAUDE.md says $CLAUDE_FIELDS fields but code has $CODE_FIELDS"
            FAIL=1
          fi

          exit $FAIL

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  plugin-check:
    name: Plugin Check
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wp_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: openssl, mbstring, mysqli
          coverage: none

      - name: Setup WordPress
        run: |
          mkdir -p /tmp/wp && cd /tmp/wp
          curl -sO https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          ./wp-cli.phar core download --skip-content
          ./wp-cli.phar config create --dbname=wp_test --dbuser=root --dbpass=root --dbhost=127.0.0.1 --skip-check
          ./wp-cli.phar core install --url=localhost --title=Test --admin_user=admin --admin_password=admin --admin_email=admin@example.com --skip-email

      - name: Install Plugin Check
        run: cd /tmp/wp && ./wp-cli.phar plugin install plugin-check --activate

      - name: Build and install plugin
        run: |
          git archive --format=zip --prefix=graphql-strava-activities/ HEAD -o /tmp/graphql-strava-activities.zip
          cd /tmp/wp && ./wp-cli.phar plugin install /tmp/graphql-strava-activities.zip --activate

      - name: Run Plugin Check
        run: |
          cd /tmp/wp
          RESULT=$(./wp-cli.phar plugin check graphql-strava-activities --format=json --fields=type,code,message 2>&1) || true
          echo "$RESULT"

          # Fail on errors (severity 8+), allow warnings.
          ERRORS=$(echo "$RESULT" | php -r '
            $input = file_get_contents("php://stdin");
            $data = json_decode($input, true);
            if (!is_array($data)) exit(0);
            $errors = array_filter($data, fn($r) => ($r["type"] ?? "") === "ERROR");
            echo count($errors);
          ')

          echo "Errors found: $ERRORS"
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Plugin Check found $ERRORS error(s). Fix them before merging."
            exit 1
          fi
