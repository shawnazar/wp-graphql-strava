<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GraphQL Strava Activities</title>
  <meta name="description" content="Documentation for GraphQL Strava Activities — a WordPress plugin that extends WPGraphQL with Strava activity data, SVG route maps, and photos.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --theme-color: #FC5200;
      --sidebar-nav-link-color--active: #FC5200;
      --sidebar-nav-link-border-color--active: #FC5200;
      --link-color: #FC5200;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'GraphQL Strava Activities',
      repo: 'shawnazar/wp-graphql-strava',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        placeholder: 'Search docs...',
        noData: 'No results.',
        depth: 3
      },
      plugins: [
        function (hook) {
          var footer = [
            '<hr/>',
            '<footer style="text-align:center; padding: 20px 0; font-size: 13px; color: #646970;">',
            '<p>Built by <a href="https://shawnazar.me" target="_blank" rel="noopener noreferrer">Shawn Azar</a>',
            ' · <a href="https://www.buymeacoffee.com/shawnazar" target="_blank" rel="noopener noreferrer">Buy Me a Coffee</a>',
            ' · <a href="https://github.com/shawnazar/wp-graphql-strava" target="_blank" rel="noopener noreferrer">GitHub</a>',
            ' · <a href="https://github.com/shawnazar/wp-graphql-strava/issues" target="_blank" rel="noopener noreferrer">Report an Issue</a>',
            ' · <a href="https://github.com/shawnazar/wp-graphql-strava/discussions" target="_blank" rel="noopener noreferrer">Discussions</a></p>',
            '</footer>'
          ].join('');

          hook.afterEach(function (html) {
            return html + footer;
          });
        }
      ]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-php.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-graphql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
